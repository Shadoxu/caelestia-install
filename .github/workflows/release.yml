name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v3.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-cli:
    name: Build caelestia-cli
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.build.outputs.artifact }}
      path: ${{ steps.build.outputs.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling hatch-vcs

      - name: Clean stale artifacts
        run: git clean -dfx

      - name: Build CLI
        id: build
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION="${GITHUB_REF_NAME#v}"
          python -m build
          echo "artifact=caelestia-cli-${{ github.ref_name }}-py3-none-any.whl" >> $GITHUB_OUTPUT
          echo "path=dist/caelestia-cli-${{ github.ref_name }}-py3-none-any.whl" >> $GITHUB_OUTPUT

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: caelestia-cli
          path: dist/*

  build-shell:
    name: Build caelestia-shell
    runs-on: ubuntu-latest
    container:
      image: archlinux:base
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm git cmake ninja clang pkg-config base-devel qt6-base qt6-declarative

      - name: Build shell
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/ \
            -DVERSION=${{ github.ref_name }} \
            -DGIT_REVISION=${{ github.sha }} \
            -DDISTRIBUTOR="github-release"
          cmake --build build -- -j$(nproc)

      - name: Package shell
        run: |
          mkdir -p release/shell
          cmake --install build --prefix release/shell
          tar -czf caelestia-shell-${{ github.ref_name }}.tar.gz -C release shell

      - name: Upload shell artifact
        uses: actions/upload-artifact@v4
        with:
          name: caelestia-shell
          path: caelestia-shell-*.tar.gz

  bundle-installer:
    name: Bundle installer
    runs-on: ubuntu-latest
    needs: [build-cli, build-shell]
    outputs:
      bundle_name: ${{ steps.bundle.outputs.bundle_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: caelestia-cli
          path: cli-1.0.6/dist

      - name: Download shell artifact
        uses: actions/download-artifact@v4
        with:
          name: caelestia-shell
          path: shell-1.5.1

      - name: Extract shell
        run: |
          mkdir -p shell-1.5.1/build
          tar -xzf shell-1.5.1/caelestia-shell-${{ github.ref_name }}.tar.gz -C shell-1.5.1/build
          rm shell-1.5.1/caelestia-shell-*.tar.gz

      - name: Prepare bundle
        id: bundle
        run: |
          BUNDLE_NAME="Caelestia-Arch-${{ github.ref_name }}"
          cp caelestia-install.sh "${BUNDLE_NAME}/"
          cp -r caelestia-main "${BUNDLE_NAME}/"
          mv cli-1.0.6/dist/*.whl "${BUNDLE_NAME}/cli-1.0.6/dist/"
          mkdir -p "${BUNDLE_NAME}/cli-1.0.6"
          mv cli-1.0.6/dist "${BUNDLE_NAME}/cli-1.0.6/"
          mkdir -p "${BUNDLE_NAME}/shell-1.5.1"
          mv shell-1.5.1/build "${BUNDLE_NAME}/shell-1.5.1/"
          echo "bundle_name=${BUNDLE_NAME}" >> $GITHUB_OUTPUT

      - name: Create archive
        run: |
          zip -r "${BUNDLE_NAME}.zip" "${BUNDLE_NAME}"
          tar -czf "${BUNDLE_NAME}.tar.gz" "${BUNDLE_NAME}"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: caelestia-bundle
          path: |
            Caelestia-Arch-*.zip
            Caelestia-Arch-*.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-shell, bundle-installer]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Caelestia ${{ github.ref_name }}
          body: |
            ## Installation

            Download the archive below and extract it, then run:
            ```bash
            bash caelestia-install.sh
            ```

            For a fully automated install:
            ```bash
            bash caelestia-install.sh --noconfirm
            ```

            ### What's included

            - **caelestia-install.sh** - Standalone installer for Arch Linux
            - **caelestia-main/** - Main dotfiles and configurations
            - **cli-1.0.6/** - caelestia CLI tool (Python 3.13+)
            - **shell-1.5.1/** - caelestia shell (Quickshell-based)

            ### Optional components

            ```bash
            bash caelestia-install.sh --spotify --vscode=codium --discord --zen
            ```

            ### Updating

            After updating, rebuild:
            ```bash
            bash caelestia-install.sh --update
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            artifacts/caelestia-bundle/Caelestia-Arch-*.zip
            artifacts/caelestia-bundle/Caelestia-Arch-*.tar.gz
            artifacts/caelestia-cli/*.whl
            artifacts/caelestia-shell/*.tar.gz
          generate_release_notes: true

      - name: Upload Release Asset
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Workflow dispatch triggered - release notes will be generated manually"
