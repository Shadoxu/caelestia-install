name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Thanks for your feature request! Please fill out the form below to help us evaluate and implement your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Describe the problem you're trying to solve.
        What is the current limitation or missing functionality?
      placeholder: |
        I want to be able to do X, but currently I have to do Y which is cumbersome...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you'd like.
        What should happen? How should it work?
      placeholder: |
        I would like to see...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Describe any alternative solutions or features you've considered.
      placeholder: |
        I've considered...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: |
        Screenshots, mockups, use cases, etc.
