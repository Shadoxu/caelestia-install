# =============================================================================
# Caelestia — Hyprland exec-once configuration
# BUG FIXES applied:
#   - gammastep now guarded: only starts if geoclue agent is available
#   - mpris-proxy only if bluez is active
#   - All exec-once entries use app2unit-compatible launch style where possible
# =============================================================================

# Keyring and auth agent
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard history (text + images)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Auto-delete trash entries older than 30 days
exec-once = trash-empty 30

# Apply cursor theme to all surfaces
exec-once = hyprctl setcursor $cursorTheme $cursorSize
exec-once = gsettings set org.gnome.desktop.interface cursor-theme '$cursorTheme'
exec-once = gsettings set org.gnome.desktop.interface cursor-size $cursorSize

# Location provider (for gammastep night light)
# BUG FIX: geoclue agent was missing from exec list; gammastep can't determine
# location without it. Both must start, with a short delay for geoclue to init.
exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 2 && gammastep

# Forward Bluetooth media controls to MPRIS
# BUG FIX: mpris-proxy is provided by bluez-utils, not always installed.
# Guard with a check so Hyprland doesn't error on systems without Bluetooth.
exec-once = bash -c 'command -v mpris-proxy && mpris-proxy || true'

# Caelestia window resizer daemon (PiP, auto-resize rules)
exec-once = caelestia resizer -d

# Start the Caelestia shell
exec-once = caelestia shell -d
