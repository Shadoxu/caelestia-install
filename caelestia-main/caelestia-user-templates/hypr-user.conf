# =============================================================================
# Caelestia — User Hyprland Config Extension
# Place this file at: ~/.config/caelestia/hypr-user.conf
#
# Add your own Hyprland rules, binds, monitors, and settings here.
# This file is sourced at the END of hyprland.conf so it always wins.
# Survives all package updates.
# =============================================================================

# ─── Monitor Configuration ───────────────────────────────────────────────────
# Examples:
# monitor = , preferred, auto, 1              # Auto-detect (default)
# monitor = DP-1, 2560x1440@165, 0x0, 1      # Primary monitor
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1 # Secondary monitor (right)
# monitor = eDP-1, 2560x1600@120, 0x0, 1.6   # Laptop HiDPI

# ─── Extra Keybinds ──────────────────────────────────────────────────────────
# bind = Super, Return, exec, foot   # Open terminal with Super+Enter
# bind = Super, B, exec, firefox     # Open Firefox with Super+B

# ─── Extra Window Rules ──────────────────────────────────────────────────────
# windowrule = float true, match:class steam
# windowrule = size 900 700, match:class steam

# ─── Environment Variables ───────────────────────────────────────────────────
# env = MOZ_ENABLE_WAYLAND, 1   # Force Firefox Wayland (usually auto)

# ─── Workspace Rules ─────────────────────────────────────────────────────────
# workspace = 1, monitor:DP-1, default:true

# ─── Input Overrides ─────────────────────────────────────────────────────────
# input {
#     kb_layout = us,ru              # Multi-layout keyboard
#     kb_options = grp:alt_shift_toggle
# }
