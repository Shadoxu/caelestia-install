# =============================================================================
# Caelestia — User Hyprland Variables Override
# Place this file at: ~/.config/caelestia/hypr-vars.conf
#
# Uncomment and modify any variable to override the default from variables.conf.
# All changes here survive package updates — never edit variables.conf directly.
# =============================================================================

# ─── Apps ────────────────────────────────────────────────────────────────────
# $terminal = foot
# $browser = zen-browser      # or: firefox, brave, chromium
# $editor = codium            # or: code, zed, nvim
# $fileExplorer = thunar      # or: nemo, nautilus, dolphin

# ─── Monitor Scale (HiDPI) ───────────────────────────────────────────────────
# Uncomment for HiDPI (e.g. 2x scale on a 4K display)
# Note: set this in hyprland.conf monitor line instead for full control:
#   monitor = DP-1, 3840x2160@60, 0x0, 2

# ─── Cursor ──────────────────────────────────────────────────────────────────
# $cursorTheme = sweet-cursors    # AUR: sweet-cursors-theme-git
# $cursorSize = 24               # 24 for 1x displays, 48 for 2x HiDPI

# ─── Window Gaps ─────────────────────────────────────────────────────────────
# $workspaceGaps = 20
# $windowGapsIn = 5
# $windowGapsOut = 10
# $singleWindowGapsOut = 20

# ─── Window Rounding ─────────────────────────────────────────────────────────
# $windowRounding = 15

# ─── Window Opacity ──────────────────────────────────────────────────────────
# $windowOpacity = 0.95      # 1.0 = fully opaque, 0.9 = 10% transparent

# ─── Blur ────────────────────────────────────────────────────────────────────
# $blurEnabled = true
# $blurSize = 8
# $blurPasses = 2
# $blurSpecialWs = false
# $blurPopups = true
# $blurXray = false

# ─── Shadow ──────────────────────────────────────────────────────────────────
# $shadowEnabled = true
# $shadowRange = 20
# $shadowRenderPower = 3

# ─── Touchpad ────────────────────────────────────────────────────────────────
# $touchpadDisableTyping = true
# $touchpadScrollFactor = 0.3
# $workspaceSwipeFingers = 4
# $gestureFingers = 3

# ─── Volume Step ─────────────────────────────────────────────────────────────
# $volumeStep = 10            # Percent per key press

# ─── Keybind Customisation ───────────────────────────────────────────────────
# These change the modifier keys used for workspace/window actions.
# $kbGoToWs = Super
# $kbMoveWinToWs = Super+Alt
# $kbToggleSpecialWs = Super, S
